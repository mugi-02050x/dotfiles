# --- Prefixキーの変更 ---
# デフォルトの Ctrl-b はVimのスクロール(戻る)と被るため解除
# unbind C-b
# Prefixを Ctrl-g に変更 (好みに応じて C-a や C-Space に変更してください)
# set -g prefix C-g
# tmux内で Ctrl-g を使いたい場合は、Prefixを2回押すことで送信可能にする
# bind C-g send-prefix

# --- 基本QoL設定 ---
# Vimでインサートモードからノーマルモードに戻る時のEscの遅延をなくす (超重要)
set -sg escape-time 10

# スクロールバックバッファを十分に確保 (デフォルト2000行では不足する場合がある)
set -g history-limit 50000

# Vimのカラースキーム(True Color等)をtmux上でも綺麗に発色させる
set -g default-terminal "tmux-256color"
set -ag terminal-overrides ",xterm-256color:RGB"

# マウス操作を有効にする (画面スクロールやペインの選択をマウスでも可能に)
set -g mouse on

# ウィンドウ・ペイン番号を1始まりにする
set -g base-index 1
setw -g pane-base-index 1
set -g renumber-windows on

# --- エージェント完了通知のベルマーク（インフラ） ---
# agent-notify が用事のあるウィンドウのペイン tty へ BEL を送ると window_bell_flag が
# 立ち、下の window-status-format がそれを検知して目印を出す。
# 該当ウィンドウを開くとフラグが下りて自動で消灯する。
set -g monitor-bell on
set -g bell-action other

# --- ステータスライン ---
# 参考: https://eiji.page/blog/tmux-status-line/
# 色はユーザーオプション(@c-*)で一元管理し、#{@c-xxx} で参照する（daisyUI 風パレット）。
set -g @c-base-100 "#001C23"
set -g @c-base-content "#FFD6A7"
set -g @c-primary "#BEFF00"
set -g @c-primary-content "#507000"
set -g @c-neutral "#003741"
set -g @c-neutral-content "#FFD6A7"
set -g @c-info "#00BAFE"
set -g @c-info-content "#042E49"

set -g status-style "bg=#{@c-base-100}"
set -g status-left-length 50
set -g status-right-length 100

# agent-notify がセットする一時通知テキスト（issue #55）。空なら status-right は
# 通常の日付時刻を表示し、非空なら通知ピルへ切り替わる。
set -g @agent_notify_text ""

# status-left: セッション名
set -g status-left '#( \
  label=" #S "; \
  bg="#{@c-base-100}"; \
  color="#{@c-primary}"; \
  text_fg="#{@c-primary-content}"; \
  echo "#[bg=$bg,fg=$color]#[bg=$color,fg=$text_fg,bold]$label#[bg=$bg,fg=$color,nobold] "; \
)'

# status-right: 通常は日付・時刻ピルを表示し、通知 (@agent_notify_text) がある間
# だけその左隣に通知を並べる（日付は上書きしない）。agent-notify が
# @agent_notify_text を一定秒数だけセットする（issue #55）。
# ネイティブ format の条件分岐なので、option を出し入れして refresh-client -S
# すれば status-interval を待たず即時に表示が切り替わる。#{@opt} の値はそのまま
# リテラル表示される（tmux 3.6 で # や % は再展開されないことを確認済み）。
# #[bg=…,fg=…] のカンマが #{?,,} の区切りと衝突しないよう #[bg=]#[fg=] に分割する。
# 通知は背景塗りなしの文字色のみ（@c-primary）で表示する。
set -g status-right '#{?#{@agent_notify_text},\
 #[bg=#{@c-base-100}]#[fg=#{@c-info}] 󱅫 #{@agent_notify_text} ,}\
 #[bg=#{@c-base-100}]#[fg=#{@c-info}]#[bg=#{@c-info}]#[fg=#{@c-info-content}]%m/%d(%a) %H:%M#[bg=#{@c-base-100}]#[fg=#{@c-info}]'

# window-status: 通常ウィンドウ。ベル（agent 完了通知）が鳴ったウィンドウには
# 󱅫 アイコンを付けて @c-info 色で強調する。表示には Nerd Font が必要。
# 各セグメントは半円キャップ()で囲んだ角丸ピルにし、区切りスペースで分離する。
set -gw window-status-separator " "
set -gw window-status-bell-style "bold"
set -gw window-status-format '#( \
  label=" #I:#W "; \
  bg="#{@c-base-100}"; \
  color="#{@c-neutral}"; \
  text_fg="#{@c-neutral-content}"; \
  if [ "#{window_bell_flag}" = "1" ]; then \
    label=" 󱅫 #I:#W "; \
    color="#{@c-info}"; \
    text_fg="#{@c-info-content}"; \
  fi; \
  echo "#[bg=$bg,fg=$color]#[bg=$color,fg=$text_fg]$label#[bg=$bg,fg=$color]"; \
)'

# window-status: カレントウィンドウ
set -gw window-status-current-format '#( \
  label=" #I:#W "; \
  bg="#{@c-base-100}"; \
  color="#{@c-primary}"; \
  text_fg="#{@c-primary-content}"; \
  echo "#[bg=$bg,fg=$color]#[bg=$color,fg=$text_fg,bold]$label#[bg=$bg,fg=$color,nobold]"; \
)'

# ペインボーダー
set -g pane-border-style "fg=#{@c-base-content}"
set -g pane-active-border-style "fg=#{@c-primary}"

# Shift+Enterなどの修飾キー付きEnterをagent系TUIへ渡す
# `on` はアプリ側が拡張キーを要求した場合だけ転送するため、
# SSH/tmux越しでも複数行入力に使えるよう常時転送する。
set -ga terminal-features 'xterm*:extkeys'
set -ga terminal-features 'tmux*:extkeys'
set -g extended-keys always

# SSHクライアント側のクリップボードへOSC 52でコピーできるようにする
set -g set-clipboard on
set -g allow-passthrough on
set -as terminal-features ',xterm*:clipboard'

# tmux attach時にSSH_TTYをセッション環境へ反映させる（デフォルトリストにはSSH_CONNECTIONのみ）。
set -ag update-environment 'SSH_TTY'

# --- ペイン操作 (Vimライク) ---
# 直感的なキーでペインを分割する (-c "#{pane_current_path}" で現在のディレクトリを引き継ぐ)
bind | split-window -h -c "#{pane_current_path}" # 縦に分割
bind - split-window -v -c "#{pane_current_path}" # 横に分割

# ペインのリサイズ (-r を付けることでPrefixキー後、大文字HJKLを連続で押してリサイズ可能)
bind -r H resize-pane -L 5
bind -r J resize-pane -D 5
bind -r K resize-pane -U 5
bind -r L resize-pane -R 5


# --- コピーモードとクリップボード連携 ---
# コピーモードのキーバインドをVim風(h,j,k,l等)にする
setw -g mode-keys vi

# 'v' でビジュアルモードのように選択を開始する
bind -T copy-mode-vi v send -X begin-selection
# 選択をキャンセルする場合は 'Esc'
bind -T copy-mode-vi Escape send -X clear-selection

# 'y' または 'Enter' でヤンク(コピー)し、ローカル/SSHクライアント側のクリップボードに渡す
bind -T copy-mode-vi y send-keys -X copy-pipe-and-cancel "clip"
bind -T copy-mode-vi Enter send-keys -X copy-pipe-and-cancel "clip"


# --- vim-tmux-navigator 連携 ---
# tmuxのペインとVimのウィンドウを Ctrl + h, j, k, l でシームレスに行き来する設定
is_vim="ps -o state= -o comm= -t '#{pane_tty}' \
    | grep -iqE '^[^TXZ ]+ +(\\S+\\/)?g?(view|n?vim?x?)(diff)?$'"
bind-key -n 'C-h' if-shell "$is_vim" 'send-keys C-h'  'select-pane -L'
bind-key -n 'C-j' if-shell "$is_vim" 'send-keys C-j'  'select-pane -D'
bind-key -n 'C-k' if-shell "$is_vim" 'send-keys C-k'  'select-pane -U'
bind-key -n 'C-l' if-shell "$is_vim" 'send-keys C-l'  'select-pane -R'

# --- lazy tools ポップアップ ---
# セッションは保持せず、共有関数でセッション維持型ポップアップと表示サイズを揃える。
bind -r g run-shell '. "$HOME/.local/lib/tmux.sh"; dot_tmux_open_transient_popup_window lazygit "#{pane_current_path}"'
bind -r q run-shell '. "$HOME/.local/lib/tmux.sh"; dot_tmux_open_transient_popup_window lazysql "#{pane_current_path}"'
bind -r k run-shell '. "$HOME/.local/lib/tmux.sh"; dot_tmux_open_transient_popup_window lazydocker "#{pane_current_path}"'

# --- エージェント利用率ポップアップ ---
# 開くたびに新規実行され、取得結果を ~/.cache/agent-usage/state.json に書き込む（常駐なし）
bind -r u display-popup -w 90 -h 16 -E agent-usage

# --- パス指定でウィンドウ作成（デフォルトの new-window を上書き） ---
# ポップアップにパスを入力すると、そのパスをカレントディレクトリとする
# 新規ウィンドウを作成する。ウィンドウ名は git リポジトリ名（管理外なら basename）。
# パス未指定（空Enter）の場合は通常の new-window を実行する。
bind c display-popup -w 60 -h 3 -E tmux-window-from-path


# --- セッション維持型ポップアップ ---
# ポップアップを閉じても実行状態（セッション）を保持する。
bind -r a run-shell '. "$HOME/.local/lib/tmux.sh"; dot_tmux_open_persistent_popup_session claude claude "#{pane_current_path}" "#{client_width}" "#{client_height}"'
bind -r o run-shell '. "$HOME/.local/lib/tmux.sh"; dot_tmux_open_persistent_popup_session codex codex "#{pane_current_path}" "#{client_width}" "#{client_height}"'
bind -r G run-shell '. "$HOME/.local/lib/tmux.sh"; dot_tmux_open_persistent_popup_session gemini gemini "#{pane_current_path}" "#{client_width}" "#{client_height}"'

# --- 稼働中 agent セッションの一覧（fzf picker） ---
# @agent マーカー付きの popup セッションを列挙し、enter で復帰・ctrl-x で終了する。
# popup 内から呼ぶと一旦閉じてメインクライアント上で開き直す（popup-in-popup 回避）。
bind p run-shell 'agent-session pick "#{session_name}"'
